name: Draw keymap

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/totem.keymap"
      - "keymap_drawer.config.yaml"
      - ".github/workflows/draw-keymap.yml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@v0.23.0
    permissions:
      contents: write
    with:
      keymap_patterns: "config/totem.keymap"
      config_path: "keymap_drawer.config.yaml"
      output_folder: "keymap-drawer"
      parse_args: "totem:'-c 10'"
      draw_args: "totem:'-s BASE VI SYM NUM MOUSE ADJ'"
      install_version: "0.23.0"
      fail_on_error: true
